global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"] 
  - job_name: "openweather"
    scrape_interval: 60s          # no tiene sentido scrapearlo cada 15s
    static_configs:
      - targets: ["openweather-exporter:9877"]
  - job_name: "stocks"
    scrape_interval: 60s
    static_configs:
      - targets: ["stocks-exporter:9878"]
